{{define "overview_cards"}}
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
  {{range .Cards}}
  <div class="bg-white dark:bg-slate-800 rounded shadow-sm border border-slate-200 dark:border-slate-700 p-4">
    <div class="text-xs uppercase tracking-wide text-slate-500 dark:text-slate-400">{{.Label}}</div>
    <div class="mt-1 text-2xl font-semibold tabular-nums">{{.Value}}{{with .Unit}} <span class="text-sm font-normal text-slate-500">{{.}}</span>{{end}}</div>
    {{with .Sub}}<div class="mt-1 text-xs text-slate-500 dark:text-slate-400">{{.}}</div>{{end}}
  </div>
  {{end}}
</div>
{{end}}
