apiVersion: v2
name: comqtt
description: |
  comqtt — a lightweight, high-performance MQTT broker (v3.0/v3.1.1/v5.0)
  supporting standalone and clustered (Raft + Gossip) deployments.
type: application
version: 0.3.0
appVersion: "2.6.0"
kubeVersion: ">=1.23.0-0"
home: https://github.com/wind-c/comqtt
sources:
  - https://github.com/wind-c/comqtt
keywords:
  - mqtt
  - broker
  - iot
  - messaging
  - pub-sub
  - cluster
  - raft
maintainers:
  - name: comqtt community
    url: https://github.com/wind-c/comqtt
icon: https://raw.githubusercontent.com/wind-c/comqtt/main/README.md
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: Gateway API support — HTTPRoute (dashboard) and TCPRoute (MQTT).
    - kind: deprecated
      description: ingress.* (use gateway.* instead).
  artifacthub.io/license: MIT
## Bitnami sub-charts intentionally omitted: as of 2025 the public bitnami/*
## Docker images are behind authentication. Bring your own Redis/Valkey,
## MySQL, or PostgreSQL — see deploy/helm/comqtt/README.md "Required
## external services" for example manifests. Cluster mode requires a
## RESP-compatible store (Redis or Valkey).
