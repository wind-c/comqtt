{{define "settings"}}{{template "layout" .}}{{end}}

{{define "content"}}
<div class="space-y-4">
  <div>
    <h1 class="text-xl font-semibold tracking-tight">Settings</h1>
    <p class="text-sm text-muted-foreground mt-1">Read-only snapshot of the running configuration.</p>
  </div>

  <div class="rounded shadow-sm border border-border overflow-hidden">
    <style>{{.HighlightCSS}}</style>
    <div class="bg-muted text-xs overflow-x-auto p-4">
      {{.HighlightedYAML}}
    </div>
  </div>
</div>
{{end}}
