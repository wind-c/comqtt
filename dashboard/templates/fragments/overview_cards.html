{{define "overview_cards"}}
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
  {{range .Cards}}
  <div class="bg-card text-card-foreground rounded shadow-sm border border-border p-4">
    <div class="text-xs uppercase tracking-wide text-muted-foreground">{{.Label}}</div>
    <div class="mt-1 text-2xl font-semibold tabular-nums">{{.Value}}{{with .Unit}} <span class="text-sm font-normal text-muted-foreground">{{.}}</span>{{end}}</div>
    {{with .Sub}}<div class="mt-1 text-xs text-muted-foreground">{{.}}</div>{{end}}
    {{with .Spark}}<div class="mt-2 h-6 text-foreground dark:text-foreground">{{.}}</div>{{end}}
  </div>
  {{end}}
</div>
{{end}}
