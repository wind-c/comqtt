{{define "blacklist"}}{{template "layout" .}}{{end}}

{{define "content"}}
<div class="space-y-4">
  <div>
    <h1 class="text-xl font-semibold tracking-tight">Blacklist</h1>
    <p class="text-sm text-muted-foreground mt-1">{{len .Items}} blocked client{{if ne (len .Items) 1}}s{{end}}</p>
  </div>

  {{with .Error}}
  <div class="rounded bg-destructive/10 text-destructive border border-destructive/20 p-2 text-xs">{{.}}</div>
  {{end}}

  <form method="POST" action="/dashboard/blacklist" class="flex items-center gap-2">
    <input type="hidden" name="_csrf" value="{{.CSRF}}" />
    <input name="client_id" required placeholder="Client ID to block"
      class="px-3 py-2 rounded border border-input bg-input text-sm w-64 focus:outline-none focus:border-ring" />
    <button {{if .Readonly}}disabled title="Read-only role"{{end}}
      class="px-3 py-2 rounded bg-destructive hover:bg-destructive/90 disabled:bg-secondary disabled:cursor-not-allowed text-white text-sm">
      Block
    </button>
  </form>

  <div class="bg-card text-card-foreground rounded shadow-sm border border-border divide-y divide-border">
    {{range .Items}}
    <div class="flex items-center justify-between px-4 py-2 text-sm">
      <span class="font-mono">{{.}}</span>
      <form method="POST" action="/dashboard/blacklist/{{.}}/delete">
        <input type="hidden" name="_csrf" value="{{$.CSRF}}" />
        <button {{if $.Readonly}}disabled title="Read-only role"{{end}}
          class="text-destructive hover:underline disabled:text-muted-foreground disabled:cursor-not-allowed">Remove</button>
      </form>
    </div>
    {{else}}
    <div class="px-4 py-8 text-center text-sm text-muted-foreground">Blacklist is empty.</div>
    {{end}}
  </div>
</div>
{{end}}
