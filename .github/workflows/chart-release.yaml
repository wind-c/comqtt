name: chart-release

on:
  push:
    branches:
      - main
    paths:
      - "deploy/helm/**"

permissions:
  contents: write
  pages: write
  id-token: write
  packages: write

jobs:
  release:
    name: Release Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: deploy/helm
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR (OCI)
        run: |
          CHART_VERSION=$(helm show chart deploy/helm/comqtt | grep '^version:' | awk '{print $2}')
          helm package deploy/helm/comqtt --destination /tmp
          helm push /tmp/comqtt-${CHART_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
